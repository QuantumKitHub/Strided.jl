# Benchmark cases for benchmarks.jl. Each group carries its BenchmarkTools
# sampling parameters and a list of cases, where `p` is the permutation and
# `size` the input size (so the output has size `size[p]`).

# The reference benchmark of HPTT / the TTC paper, reproduced verbatim at the
# original (large, bandwidth-bound) sizes, with the 0-based permutations
# translated to 1-based:
# https://github.com/springer13/hptt/blob/master/benchmark/benchmark.sh
# Each permutation comes in three size variants: balanced dims, large first
# dim, large last dim.
[hptt]
samples = 10
seconds = 10
cases = [
    { p = [2, 1], size = [7264, 7264] },
    { p = [2, 1], size = [43408, 1216] },
    { p = [2, 1], size = [1216, 43408] },
