# Small to medium sizes, including the permutation cases of strided-rs
# (https://github.com/tensor4all/strided-rs), to track per-call overhead,
# dispatch cost, and the non-threaded fast paths.
[small]
samples = 1000
seconds = 5
cases = [
    { p = [2, 1], size = [16, 16] },
    { p = [2, 1], size = [64, 64] },
    { p = [2, 1], size = [256, 256] },
    { p = [2, 1], size = [1000, 1000] },
    { p = [2, 1], size = [4000, 4000] },
    { p = [3, 2, 1], size = [16, 16, 16] },
    { p = [3, 2, 1], size = [64, 64, 64] },
    { p = [2, 3, 1], size = [16, 16, 16] },
    { p = [2, 3, 1], size = [64, 64, 64] },
    { p = [4, 3, 2, 1], size = [8, 8, 8, 8] },
    { p = [4, 3, 2, 1], size = [16, 16, 16, 16] },
    { p = [4, 3, 2, 1], size = [32, 32, 32, 32] },
    { p = [2, 1, 4, 3], size = [8, 8, 8, 8] },
    { p = [2, 1, 4, 3], size = [16, 16, 16, 16] },
    { p = [2, 1, 4, 3], size = [32, 32, 32, 32] },
    { p = [3, 4, 1, 2], size = [8, 8, 8, 8] },
    { p = [3, 4, 1, 2], size = [16, 16, 16, 16] },
    { p = [3, 4, 1, 2], size = [32, 32, 32, 32] },
    { p = [2, 3, 4, 1], size = [8, 8, 8, 8] },
    { p = [2, 3, 4, 1], size = [16, 16, 16, 16] },
    { p = [2, 3, 4, 1], size = [32, 32, 32, 32] },
]

# Sizes that are not multiples of the SIMD vector width: powers of two +- 1,
# primes, and mixed odd/rectangular shapes. These defeat aligned vectorization
# and exercise the vector-remainder loops and blocking edge cases that the
# power-of-two sizes of the other groups never hit.
[unaligned]
samples = 1000
seconds = 5
cases = [
    { p = [2, 1], size = [17, 17] },
    { p = [2, 1], size = [63, 63] },
    { p = [2, 1], size = [129, 129] },
    { p = [2, 1], size = [251, 251] },
    { p = [2, 1], size = [999, 1001] },
    { p = [2, 1], size = [1021, 1021] },
    { p = [3, 2, 1], size = [15, 15, 15] },
    { p = [3, 2, 1], size = [17, 17, 17] },
    { p = [3, 2, 1], size = [63, 63, 63] },
    { p = [3, 2, 1], size = [65, 65, 65] },
    { p = [3, 2, 1], size = [31, 32, 33] },
    { p = [3, 2, 1], size = [37, 61, 89] },
    { p = [2, 3, 1], size = [15, 15, 15] },
    { p = [2, 3, 1], size = [17, 17, 17] },
    { p = [2, 3, 1], size = [63, 63, 63] },
    { p = [2, 3, 1], size = [65, 65, 65] },
    { p = [2, 3, 1], size = [31, 32, 33] },
